<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZeroWait Home</title>

<link rel="stylesheet" href="home.css">
</head>

<body>

<header class="hero">

    <div class="hero-content">

        <h1 id="welcomeHome">
            Welcome Back
        </h1>

        <p>
            Skip the wait. Order faster.
        </p>

        <div class="search-box">

            <input
                type="text"
                placeholder="Search Restaurants, Food..."
            >

        </div>

    </div>

</header>

<div class="container">

    <h2 class="section-title">
        Categories
    </h2>

    <div class="categories">

        <div class="category-card">🍕 Pizza</div>
        <div class="category-card">🍔 Burger</div>
        <div class="category-card">🍛 Biryani</div>
        <div class="category-card">☕ Cafe</div>
        <div class="category-card">🥗 Healthy</div>

    </div>

    <h2 class="section-title">
        Popular Restaurants
    </h2>

    <div class="restaurant-grid">

        <div class="restaurant-card">
            <img src="https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=800">
            <h3>Paradise Biryani</h3>
            <p>⭐ 4.8 • 15 min</p>
            <button onclick="window.location.href='restaurant.html'">
                Order Now
            </button>
        </div>

        <div class="restaurant-card">
            <img src="https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=800">
            <h3>Pizza Hut</h3>
            <p>⭐ 4.7 • 12 min</p>
            <button onclick="window.location.href='restaurant.html'">
                Order Now
            </button>
        </div>

        <div class="restaurant-card">
            <img src="https://images.unsplash.com/photo-1552566626-52f8b828add9?w=800">
            <h3>Burger King</h3>
            <p>⭐ 4.6 • 10 min</p>
            <button onclick="window.location.href='restaurant.html'">
                Order Now
            </button>
        </div>

    </div>

</div>

<nav class="bottom-nav">

    <a href="home.html">🏠 Home</a>

    <a href="profile.html">👤 Profile</a>

</nav>

<script src="home.js"></script>

</body>
</html>

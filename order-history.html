<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders - ZeroWait</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f7fb;
    padding:30px;
}

h1{
    text-align:center;
    color:#00a8a8;
    margin-bottom:30px;
}

#customerName{
    text-align:center;
    color:#555;
    margin-bottom:30px;
}

.order-card{

    max-width:700px;
    margin:20px auto;
    background:#fff;
    border-radius:18px;
    padding:20px;
    box-shadow:0 8px 20px rgba(0,0,0,.1);

}

.order-card h2{

    color:#00a8a8;
    margin-bottom:15px;

}

.row{

    margin:10px 0;
    font-size:16px;

}

.items{

    margin-top:10px;
    padding-left:20px;

}

.items li{

    margin:6px 0;

}

.status{

    display:inline-block;
    padding:8px 18px;
    border-radius:30px;
    color:white;
    font-weight:bold;
    margin-top:10px;

}

.Pending{

    background:#ff9800;

}

.Accepted{

    background:#2196f3;

}

.Preparing{

    background:#673ab7;

}

.Ready{

    background:#4caf50;

}

.Completed{

    background:#009688;

}

button{

    display:block;
    margin:30px auto;
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:#00a8a8;
    color:white;
    font-size:16px;
    cursor:pointer;

}

button:hover{

    background:#008080;

}

.empty{

    text-align:center;
    color:#777;
    margin-top:50px;

}

</style>

</head>

<body>

<h1>My Orders</h1>

<h3 id="customerName"></h3>

<div id="ordersContainer"></div>

<button onclick="window.location.href='index.html'">
Back to Home
</button>

<script>

const API_BASE="https://zerowait-2.onrender.com";

const customer = localStorage.getItem("name");
console.log("Customer from localStorage:", customer);

document.getElementById("customerName").innerText =
    customer ? "Welcome, " + customer : "";
async function loadHistory(){

try{

console.log(
`${API_BASE}/api/orders/history?customer=${encodeURIComponent(customer)}`
);

const response=await fetch(
`${API_BASE}/api/orders/history?customer=${encodeURIComponent(customer)}`
);

const orders = await response.json();

console.log("Orders received:", orders);

const container=document.getElementById("ordersContainer");

container.innerHTML="";

if(!orders.length){

container.innerHTML=`
<div class="empty">
<h2>No Orders Found</h2>
</div>
`;

return;

}

orders.forEach(order=>{

let itemsHTML="";

(order.items||[]).forEach(item=>{

itemsHTML+=`
<li>
${item.name} × ${item.quantity}
&nbsp;&nbsp;₹${item.price}
</li>
`;

});

container.innerHTML+=`

<div class="order-card">

<h2>${order.restaurant}</h2>

<div class="row">
<b>Customer:</b>
${order.customer_name}
</div>

<div class="row">
<b>Order Type:</b>
${order.order_type}
</div>

<div class="row">
<b>Table:</b>
${order.table_number}
</div>

<div class="row">
<b>Items</b>

<ul class="items">

${itemsHTML}

</ul>

</div>

<div class="row">

<b>Total:</b>

₹${order.amount}

</div>

<div class="row">

<b>Date:</b>

${new Date(order.created_at).toLocaleString()}

</div>

<div class="status ${order.status}">

${order.status}

</div>

</div>

`;

});

}catch(err){

console.error(err);

alert("Unable to load order history.");

}

}

loadHistory();

</script>

</body>
</html>

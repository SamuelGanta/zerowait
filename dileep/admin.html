<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZeroWait Restaurant Dashboard</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#f4f8f9;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.logo{
    color:#009e99;
    font-size:40px;
    font-weight:bold;
}

.stats{
    display:flex;
    gap:20px;
}

.stat-card{
    background:white;
    padding:20px;
    min-width:160px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.stat-card h3{
    color:#009e99;
    margin-bottom:10px;
}

.orders-grid{
    display:grid;
    gap:20px;
}

.order-card{
    background:white;
    border-radius:20px;
    padding:25px;
    box-shadow:0 8px 20px rgba(0,0,0,.08);
}

.order-header{
    display:flex;
    justify-content:space-between;
    margin-bottom:15px;
}

.order-id{
    font-size:24px;
    font-weight:bold;
}

.amount{
    color:#009e99;
    font-size:20px;
    font-weight:bold;
}

.status-badge{
    display:inline-block;
    padding:8px 15px;
    border-radius:30px;
    color:white;
    font-weight:bold;
    margin-top:10px;
}

.pending-badge{
    background:#f39c12;
}

.preparing-badge{
    background:#3498db;
}

.ready-badge{
    background:#27ae60;
}

.buttons{
    margin-top:20px;
}

button{
    border:none;
    padding:12px 18px;
    border-radius:10px;
    cursor:pointer;
    margin-right:10px;
    color:white;
    font-weight:bold;
}

.pending{
    background:#f39c12;
}

.preparing{
    background:#3498db;
}

.ready{
    background:#27ae60;
}

.empty{
    text-align:center;
    padding:50px;
    background:white;
    border-radius:20px;
}

</style>

</head>

<body>

<div class="header">

    <div class="logo">
        ZeroWait Dashboard
    </div>

    <div class="stats">

        <div class="stat-card">
            <h3>Total Orders</h3>
            <h2 id="totalOrders">0</h2>
        </div>

        <div class="stat-card">
            <h3>Pending</h3>
            <h2 id="pendingCount">0</h2>
        </div>

        <div class="stat-card">
            <h3>Revenue</h3>
            <h2>₹<span id="revenue">0</span></h2>
        </div>

    </div>

</div>

<div id="orders" class="orders-grid"></div>

<script src="admin.js"></script>

</body>

</html>

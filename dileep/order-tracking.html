<!DOCTYPE html>
<html>
<head>
    <title>Track Order - ZeroWait</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            width:420px;
            background:white;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        h1{
            color:#00a8a8;
        }

        .status{
            font-size:32px;
            font-weight:bold;
            margin:30px 0;
        }

        .box{
            margin:20px 0;
            padding:20px;
            background:#f7f7f7;
            border-radius:15px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Order Tracking</h1>

    <div class="status" id="status">
        Loading...
    </div>

    <div class="box">
        Queue Position:
        <h2 id="queue">0</h2>
    </div>

    <div class="box">
        Estimated Wait:
        <h2 id="wait">0 Minutes</h2>
    </div>

</div>

<script>

async function loadOrder() {

    try {

        const response = await fetch(
            "/api/latest-order"
        );

        const data = await response.json();

        document.getElementById("status")
            .innerText = data.status;

        document.getElementById("queue")
            .innerText = data.queuePosition;

        document.getElementById("wait")
            .innerText = data.waitTime + " Minutes";

    } catch (err) {

        console.error(err);
        alert("Failed to load order");
    }
}

loadOrder();

// Refresh every 5 seconds
setInterval(loadOrder, 5000);

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">
<title>ZeroWait Profile</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f7fa;
}

.header{
    background:linear-gradient(135deg,#009e99,#00c7be);
    color:white;
    padding:40px;
    text-align:center;
}

.profile-card{
    width:90%;
    max-width:1000px;
    margin:-30px auto 20px;
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.avatar{
    width:90px;
    height:90px;
    border-radius:50%;
    background:#009e99;
    color:white;
    font-size:35px;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:auto;
}

.welcome{
    text-align:center;
    margin-top:15px;
}

.phone{
    text-align:center;
    color:#666;
    margin-top:8px;
}

.stats{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#f8f9fb;
    padding:20px;
    border-radius:15px;
    text-align:center;
}

.card h2{
    color:#009e99;
    margin-bottom:10px;
}

.logout-btn{
    margin-top:30px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#ff4d4f;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.logout-btn:hover{
    opacity:.9;
}

</style>

</head>
<body>

<div class="header">
    <h1>ZeroWait Dashboard</h1>
    <p>Your personal account</p>
</div>

<div class="profile-card">

<div class="avatar" id="avatar">S</div>

<div class="welcome">
    <h2 id="welcome"></h2>
</div>

<div class="phone" id="phone"></div>

<div class="stats">

    <div class="card">
        <h2>0</h2>
        <p>Total Orders</p>
    </div>

    <div class="card">
        <h2>0 hrs</h2>
        <p>Time Saved</p>
    </div>

    <div class="card">
        <h2>0</h2>
        <p>Rewards Earned</p>
    </div>

    <div class="card">
        <h2>0</h2>
        <p>Favorite Restaurants</p>
    </div>

</div>

<button class="logout-btn" onclick="logout()">
    Logout
</button>

</div>

<script>

if(localStorage.getItem("loggedIn") !== "true"){
    window.location.href = "index.html";
}

const userName =
    localStorage.getItem("name") || "Guest";

document.getElementById("welcome").innerText =
    `Hi ${userName}, Welcome to ZeroWait`;

document.getElementById("phone").innerText =
    "📱 " + localStorage.getItem("phone");

document.getElementById("avatar").innerText =
    userName.charAt(0).toUpperCase();

function logout(){

    localStorage.removeItem("loggedIn");
    localStorage.removeItem("phone");
    localStorage.removeItem("name");

    window.location.href = "index.html";

}

</script>

</body>
</html>

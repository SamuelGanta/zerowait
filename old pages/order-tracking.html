<!DOCTYPE html>
<html>
<head>
    <title>Track Order - ZeroWait</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f4f7fb;
            display:flex;
            justify-content:center;
            align-items:center;
            min-height:100vh;
            margin:0;
            padding:20px;
        }

        .card{
            width:500px;
            max-width:100%;
            background:white;
            border-radius:20px;
            padding:40px;
            text-align:center;
            box-shadow:0 10px 30px rgba(0,0,0,.1);
        }

        h1{
            color:#00a8a8;
            margin-bottom:10px;
        }

        #restaurantName{
            color:#444;
            margin-bottom:20px;
        }

        .status{
            font-size:32px;
            font-weight:bold;
            margin:25px 0;
            color:#ff9800;
        }

        .box{
            margin:18px 0;
            padding:18px;
            background:#f7f7f7;
            border-radius:15px;
        }

        .box h2{
            margin:10px 0 0;
        }

        #items{
            margin-top:10px;
            text-align:left;
        }

        #items p{
            margin:8px 0;
            font-size:16px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>Order Tracking</h1>

    <h2 id="restaurantName">Loading...</h2>

    <div class="status" id="status">
        Loading...
    </div>

    <div class="box">
        Customer
        <h2 id="customer">-</h2>
    </div>

    <div class="box">
        Order Type
        <h2 id="orderType">-</h2>
    </div>

    <div class="box">
        Table
        <h2 id="table">-</h2>
    </div>

    <div class="box">
        Ordered Items
        <div id="items"></div>
    </div>

    <div class="box">
        Total Amount
        <h2>₹<span id="amount">0</span></h2>
    </div>

    <div class="box">
        Queue Position
        <h2 id="queue">0</h2>
    </div>

    <div class="box">
        Estimated Wait
        <h2 id="wait">0 Minutes</h2>
    </div>

</div>

<script>

const API_BASE = "https://zerowait-2.onrender.com";

async function loadOrder() {

    try {

        const response = await fetch(`${API_BASE}/api/latest-order`);

        const data = await response.json();

        document.getElementById("restaurantName").innerText =
            data.restaurant || "Restaurant";

        document.getElementById("status").innerText =
            data.status || "Pending";

        document.getElementById("customer").innerText =
            data.customer || "-";

        document.getElementById("orderType").innerText =
            data.orderType || "-";

        document.getElementById("table").innerText =
            data.table || "-";

        document.getElementById("amount").innerText =
            data.amount || 0;

        document.getElementById("queue").innerText =
            data.queuePosition || 0;

        document.getElementById("wait").innerText =
            (data.waitTime || 0) + " Minutes";

        const itemsDiv = document.getElementById("items");

        itemsDiv.innerHTML = "";

        if (data.items && data.items.length > 0) {

            data.items.forEach(item => {

                itemsDiv.innerHTML += `
                    <p>
                        🍽 ${item.name} × ${item.quantity}
                        - ₹${item.price}
                    </p>
                `;

            });

        } else {

            itemsDiv.innerHTML =
                "<p>No items available.</p>";

        }

    } catch (err) {

        console.error(err);

        alert("Failed to load order");

    }

}

loadOrder();

// Auto Refresh
setInterval(loadOrder, 5000);

</script>

</body>
</html>
